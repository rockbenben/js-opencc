name: Sync OpenCC Dictionaries

on:
  schedule:
    # Biweekly: 1st and 15th of each month at 00:00 UTC.
    # (cron has no native "every 2 weeks"; two fixed monthly anchors is the
    # standard equivalent — ~14-day cadence, deterministic, no week-parity hacks.)
    - cron: "0 0 1,15 * *"
  workflow_dispatch: # Manual trigger

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # commit version bump, push tag
      issues: write     # open issue on failure

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync dictionaries from OpenCC
        run: npm run sync:opencc

      - name: Check for dictionary changes
        id: check_changes
        run: |
          # src/dict/ and data/official/ are gitignored (generated content), so
          # `git status` would never see sync output. We watch the tracked
          # `.opencc-sync.json` manifest instead — it stores content hashes of
          # upstream dict files and only changes when upstream changes.
          if [[ -n $(git status --porcelain .opencc-sync.json) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Detected upstream OpenCC dict changes:"
            git --no-pager diff .opencc-sync.json || cat .opencc-sync.json
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No upstream OpenCC dict changes — exiting cleanly."
          fi

      - name: Build (dist only — sync ran above)
        if: steps.check_changes.outputs.changes == 'true'
        run: npm run build:dist

      - name: Run tests
        if: steps.check_changes.outputs.changes == 'true'
        run: npm test

      - name: Configure git
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        if: steps.check_changes.outputs.changes == 'true'
        id: bump
        run: |
          # npm version patch returns "v2.0.1" (with leading v)
          NEW_TAG=$(npm version patch --no-git-tag-version)
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_TAG"

      - name: Commit, tag, push
        # Side-effect step: only run on main. `workflow_dispatch` from another
        # branch still executes everything above (sync + build + test) as a
        # dry-run, but must not push or release.
        if: steps.check_changes.outputs.changes == 'true' && github.ref == 'refs/heads/main'
        run: |
          git add .opencc-sync.json package.json package-lock.json
          git commit -m "chore: biweekly OpenCC sync ${{ steps.bump.outputs.tag }}"
          git tag ${{ steps.bump.outputs.tag }}
          # Push the bump commit first, then the lightweight tag explicitly.
          # `--follow-tags` only pushes annotated tags; an unpushed tag would
          # cause action-gh-release to create the release on the old GITHUB_SHA
          # (pre-bump) instead of our new commit.
          git push origin HEAD:main
          git push origin ${{ steps.bump.outputs.tag }}

      - name: Create GitHub Release (triggers npm-publish workflow)
        if: steps.check_changes.outputs.changes == 'true' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          # Must use a PAT, not the default GITHUB_TOKEN: GitHub deliberately
          # suppresses workflow triggers for events raised by GITHUB_TOKEN
          # (anti-recursion). A release created with GITHUB_TOKEN would NOT fire
          # the `release: published` event that npm-publish.yml listens on, so
          # the package would never reach npm. A PAT counts as a real identity
          # and DOES trigger downstream workflows.
          # RELEASE_PAT: fine-grained PAT scoped to this repo, Contents: write.
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          body: |
            Automated biweekly sync from upstream OpenCC (master branch).

            The committed change is the `.opencc-sync.json` manifest (content
            hashes of upstream dict files). The actual dict source/generated
            files (`data/official/`, `src/dict/`) are gitignored and rebuilt
            from upstream by the `Publish to NPM` workflow before publishing.

            Published to npm by the `Publish to NPM` workflow triggered by this release.

      - name: Open or update failure issue
        # Deduplicate: if an open issue with the `sync-failure` label exists,
        # append a comment instead of opening a new one. Prevents months of
        # duplicate issues when upstream is broken for several sync cycles.
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-failure',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Another sync run failed on ${today}.\n\n**Workflow run:** ${runUrl}`,
              });
              return;
            }

            const body = [
              `The biweekly OpenCC sync workflow failed on ${today}.`,
              ``,
              `**Workflow run:** ${runUrl}`,
              ``,
              `Common causes:`,
              `- Upstream OpenCC restructured dictionary files (a sync script update may be needed)`,
              `- A new dictionary file was added that needs to be added to the bundle imports`,
              `- Tests are catching a regression from new dict data`,
              ``,
              `Please inspect the workflow logs and either fix the sync script / dict references, or revert the offending upstream change manually.`,
              ``,
              `_Subsequent failures are appended as comments. Close this issue once resolved._`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Biweekly OpenCC sync failing`,
              body,
              labels: ['automation', 'sync-failure'],
            });
